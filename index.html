<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>USACH Campus Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/libs/material-design-spinner/dist/style.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body style="position: relative;">
  <!-- Loading Overlay -->
  <div id="loader-overlay">
    <svg class="spinner" width="65px" height="65px" viewBox="0 0 66 66" xmlns="http://www.w3.org/2000/svg">
      <circle class="path" fill="none" stroke-width="6" stroke-linecap="round" cx="33" cy="33" r="30"></circle>
    </svg>
  </div>

  <div id="map"></div>

  <div class="top-ui">
    <div class="search-container glass">
      <input type="text" id="search-input" placeholder="Busca aquí" autocomplete="off">
      <ul id="search-results"></ul>
    </div>
    <div class="chips-container">
      <button class="chip" id="btn-accesos">
        <span class="chip-icon" style="mask-image: url('assets/svg/Salida.svg'); -webkit-mask-image: url('assets/svg/Salida.svg');"></span>
        <span style="vertical-align: middle;">Entradas y Salidas</span>
      </button>
      <button class="chip" id="btn-banos">
        <span class="chip-icon" style="mask-image: url('assets/svg/Wc.svg'); -webkit-mask-image: url('assets/svg/Wc.svg');"></span>
        <span style="vertical-align: middle;">Baños</span>
      </button>
      <button class="chip" id="btn-impresiones">
        <span class="chip-icon" style="mask-image: url('assets/svg/Impresora.svg'); -webkit-mask-image: url('assets/svg/Impresora.svg');"></span>
        <span style="vertical-align: middle;">Impresiones</span>
      </button>
      <button class="chip" id="btn-comida">
        <span class="chip-icon" style="mask-image: url('assets/svg/Comida.svg'); -webkit-mask-image: url('assets/svg/Comida.svg');"></span>
        <span style="vertical-align: middle;">Comida</span>
      </button>
      <button class="chip" id="btn-more">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="#1e1e1e"
          style="vertical-align: middle; margin-right: 6px;">
          <circle cx="5" cy="12" r="2"></circle>
          <circle cx="12" cy="12" r="2"></circle>
          <circle cx="19" cy="12" r="2"></circle>
        </svg>
        <span style="vertical-align: middle;">Más</span>
      </button>
    </div>
  </div>

  <button id="gps-button" class="location-btn glass" aria-label="Mi ubicación">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
    </svg>
  </button>

  <div id="bottom-sheet" class="bottom-sheet glass">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <!-- Default View (Visible when no POI is selected) -->
      <div id="default-sheet-content">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 id="sheet-date">Cargando fecha...</h2>
          <div class="weather-pill glass">
            <span>18°</span>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.41 1.41c.39.39 1.02.39 1.41 0s.39-1.02 0-1.41L5.99 4.58zm12.02 12.02a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.41 1.41c.39.39 1.02.39 1.41 0s.39-1.02 0-1.41l-1.41-1.41zm-12.02 0l-1.41 1.41c-.39.39-.39 1.02 0 1.41s1.02.39 1.41 0l1.41-1.41c.39-.39.39-1.02 0-1.41s-1.02-.39-1.41 0zM18.01 4.58l-1.41 1.41c-.39.39-.39 1.02 0 1.41s1.02.39 1.41 0l1.41-1.41a.996.996 0 000-1.41c-.39-.39-1.03-.39-1.41 0z" />
            </svg>
          </div>
        </div>
        <p style="margin-bottom: 20px;">¿A dónde quieres ir hoy? Explora el campus de la USACH.</p>
        <div class="quick-links">
          <div class="quick-link-item glass">
            <div class="quick-link-icon">🎓</div>
            <div class="quick-link-label">Aula Virtual</div>
          </div>
          <div class="quick-link-item glass">
            <div class="quick-link-icon">🍕</div>
            <div class="quick-link-label">Casinos</div>
          </div>
          <div class="quick-link-item glass">
            <div class="quick-link-icon">📚</div>
            <div class="quick-link-label">Biblioteca</div>
          </div>
        </div>
      </div>

      <!-- Detail View (Hidden by default, shown when POI selected) -->
      <div id="poi-sheet-content" class="hidden">
        <div class="poi-sheet-header">
          <h2 id="sheet-title">Nombre de la Sala</h2>
          <button id="btn-close-poi" class="poi-close-btn" aria-label="Cerrar">
            <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#212121">
              <path
                d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
            </svg>
          </button>
        </div>
        <p id="sheet-edificio">Edificio: </p>
        <p id="sheet-piso">Piso: </p>
        <p id="sheet-capacidad">Capacidad: </p>
        <div class="sheet-actions">
          <button id="btn-navigate" class="primary-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              style="width:18px;height:18px;margin-right:8px;vertical-align:middle;">
              <path d="M9 18l6-6-6-6" />
            </svg>
            <span style="vertical-align:middle;">Cómo llegar</span>
          </button>
        </div>
      </div>

      <!-- Route Info View (Shown during active navigation) -->
      <div id="route-sheet-content" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
          <div>
            <h2 id="route-info">10 min (700 m)</h2>
            <p style="margin: 2px 0 0 0; font-size: 13px; color: #666;">Direcciones USACH</p>
          </div>
          <button id="btn-end-route" class="close-btn" aria-label="Cerrar ruta">X</button>
        </div>
      </div>

      <!-- Search View (Google Maps Style) -->
      <div id="search-sheet-content" class="hidden">
        <div class="search-sheet-header">
          <button id="btn-back-search" class="back-btn" aria-label="Volver">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
          </button>
          <div id="dual-search-inputs" class="search-inputs-group">
            <div class="input-row">
              <div class="dot-icon origin"></div>
              <input type="text" id="origin-input" placeholder="Elige la ubicación de partida" autocomplete="off">
            </div>
            <div class="input-divider"></div>
            <div class="input-row">
              <div class="dot-icon destination"></div>
              <input type="text" id="destination-input" placeholder="Elige la llegada" autocomplete="off">
            </div>
          </div>
          <div id="simple-search-inputs" class="search-inputs-group hidden">
            <div class="input-row">
              <div class="dot-icon destination"></div>
              <input type="text" id="sheet-main-input" placeholder="Busca un lugar en la USACH" autocomplete="off">
            </div>
          </div>
        </div>

        <div class="search-sheet-body">
          <div class="quick-actions-row">
            <button id="btn-use-location" class="action-chip">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
              </svg>
              <span>Mi ubicación</span>
            </button>
          </div>

          <div class="history-section">
            <h3>Recientes</h3>
            <ul id="search-history-list" class="history-list">
              <!-- History items will be injected here -->
            </ul>
          </div>
          
          <ul id="sheet-search-results" class="history-list hidden">
            <!-- Dynamic search results will appear here -->
          </ul>
        </div>
      </div>

    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
  <!-- Turf.js for geographic operations (like routing) -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <!-- Three.js for 3D Models Mapbox integration -->
  <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="js/app.js?v=69"></script>
</body>

</html>
